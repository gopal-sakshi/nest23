type Movie {
  _id: String!
  title: String!
  releaseYear: Int
  director: String
}

type gRPCMovie {
    id: String
    name: String
    description: String
}

type Query {
  getMovies: [Movie!]!
  getMovieById(_id: String!): Movie

  getGrpcData(id: String!): gRPCMovie

}

type Mutation {
  createMovie(title: String!, director: String!, releaseYear: Int!): Movie!
  createMovieWithPubSub(title: String!, director: String!, releaseYear: Int!): Movie!
}

type Subscription {
  movieAdded: Movie
}